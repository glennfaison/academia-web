<div class="card-header">
  <h1 class="text-center">Log In</h1>
</div>
<div class="card-body">
  <form #form="ngForm" [noValidate]="false">

      <div class="d-flex flex-column flex-md-row">
        <div class="px-md-1 flex-fill required">
          <label> Username / Email Address </label>
          <input class="form-control" type="email" name="email" ngModel #email="ngModel" required />
        </div>
      </div>
      <div class="d-flex flex-column flex-md-row">
        <div class="px-md-1 flex-fill required">
          <label> Password </label>
          <input class="form-control" type="password" name="password" ngModel #password="ngModel" required />
        </div>
      </div>

  </form>
</div>








<div class="container-fluid">
  <div class="row">
    <div class="mx-auto col-md-8">
      <div class="card">

        <div class="card-footer text-center">
          <div class="row">
            <button class="btn btn-fill btn-info mx-auto" (click)="onSubmit(form)" type="submit">Log In</button>
            <button class="btn btn-fill btn-danger mx-auto" (click)="onCancel()" type="cancel">Log Out</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
